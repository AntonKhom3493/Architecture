# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift


name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
    build-and-test:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build and test
      run: xcodebuild clean build test -workspace Architecture/Architecture.xcodeproj -scheme "CI" -sdk iphonesimulator -destination "platform=iOS Simulator,name=iPhone 16" ONLY_ACTIVE_ARCH=NO CODE_SIGNING_REQUIRED=NO
